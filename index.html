<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">GLOW STORE</a>
            <button class="btn btn-outline-light position-relative" data-bs-toggle="modal" data-bs-target="#carritoModal">
                <i class="fas fa-shopping-cart"></i>
                <span id="contador-carrito" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
            </button>
        </div>
    </nav>

    <header class="bg-light py-5 border-bottom mb-5">
        <div class="container text-center">
            <h1 class="display-4 fw-bold">Catalogo 2026</h1>
            <p class="lead"></p>
        </div>
    </header>

    <main class="container">
        <div class="row" id="contenedor-productos">
            </div>
    </main>

    <div class="modal fade" id="carritoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title font-monospace">TU COMPRA</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="items-carrito">
                        </div>
                    <div class="text-end mt-3">
                        <h4>Total: $<span id="total-precio">0</span></h4>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" id="vaciar-carrito">Vaciar</button>
                    <button class="btn btn-dark">Pagar Ahora</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
    </body>
</html>
